version: '3.8'

services:
  backend:
    build: ./backend
    container_name: chat-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb+srv://Vishal_Gupta:Dew%21CrY6E3KUxA4@cluster0.juna7.mongodb.net/chat?retryWrites=true&w=majority
      - CORS_ORIGIN=http://localhost   # change to your frontend URL in production
    ports:
      - "5000:5000"   # optional – only if you want direct backend access
    networks:
      - chat-network

  frontend:
    build: ./frontend
    container_name: chat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge